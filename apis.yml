description: >-
  FanDuel is a major US sports betting and daily fantasy sports operator (FanDuel Sportsbook, FanDuel
  Casino, FanDuel Fantasy, FanDuel TV). FanDuel does not publish a public developer REST API for its
  sportsbook, casino, or fantasy products. Internal/private APIs power the apps and a
  Sportradar/SBTech-derived trading stack but are not available to third-party developers.
