strengths:
  - Dominant U.S. market position in regulated sports betting and DFS under Flutter Entertainment
  - Mature consumer iOS/Android footprint across Sportsbook, Casino, Fantasy, and Racing
  - Active affiliate/partner program (fanduelpartners.com) for marketing distribution
  - Engineering scale and trading infrastructure to support a partner API surface if business priorities shift
gaps:
  - No public developer REST API for sportsbook, casino, fantasy, or racing products
  - No documented public streaming API (WebSocket or SSE) for live odds or in-play data
  - No developer portal, sandbox, API keys, or self-service onboarding
  - No public OpenAPI/AsyncAPI specifications
  - No public SDKs, CLIs, or webhook program
  - No public status page or machine-readable changelog for any API surface
  - GitHub organization (github.com/fanduel) holds no developer-facing public repositories
  - Regulatory posture (state-by-state gaming licensure, KYC/AML, responsible gaming) is a structural barrier to opening any public developer surface
recommendation: >-
  Tier-3, no-apis. Maintain the registry entry as the canonical
  reference for FanDuel's (lack of) public API posture and the broader
  U.S. regulated sportsbook landscape, but do not invest further
  pipeline cycles unless FanDuel or its parent Flutter Entertainment
  publishes a partner, affiliate, or B2B trading API with developer
  documentation. Pair this entry with profiles of upstream data
  providers (Sportradar, Genius Sports) and licensed aggregators
  (OddsJam, The Odds API) where the actual programmable surface for
  FanDuel-derived odds and markets lives.
