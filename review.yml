aid: fanduel
name: FanDuel
url: https://www.fanduel.com
type: company
tier: 3
tier-reason: no-apis
reviewed: '2026-05-29'
reviewer: Kin Lane
summary: >-
  FanDuel is one of the largest U.S. sports betting and daily fantasy
  sports operators (FanDuel Sportsbook, FanDuel Casino, FanDuel Fantasy,
  FanDuel TV/Racing), majority-owned by Flutter Entertainment. The
  consumer products are powered by internal trading and wallet platforms
  derived from the Flutter/SBTech stack with upstream odds and data
  feeds from Sportradar, Genius Sports, and similar B2B providers. As of
  May 2026, FanDuel does not publish a public developer REST or
  streaming API for any of its sportsbook, casino, fantasy, or racing
  products. There is no developer portal, no OpenAPI specification, no
  documented WebSocket/SSE odds stream, no public SDKs, and no public
  webhook program. The FanDuel GitHub organization exists but contains
  no developer-facing repositories. Third-party access to FanDuel odds
  is only available indirectly through licensed odds aggregators
  (Sportradar, Genius Sports, OddsJam, The Odds API, OddsPapi, etc.) or
  via unauthorized scraping of the consumer apps, which violates
  FanDuel's Terms of Service. Partnership/affiliate programs
  (fanduelpartners.com) are marketing-only and do not expose a
  programmable API surface.
